name: Build Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            os_short: linux
          - platform: windows-latest
            os_short: win
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── CUDA Toolkit (no GPU needed, just compiler) ──

      - name: Install CUDA Toolkit (Linux)
        if: matrix.os_short == 'linux'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-13-2
          echo "/usr/local/cuda-13.2/bin" >> $GITHUB_PATH
          echo "CUDA_HOME=/usr/local/cuda-13.2" >> $GITHUB_ENV

      - name: Install CUDA Toolkit (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          # Download CUDA 13.2 network installer
          $url = "https://developer.download.nvidia.com/compute/cuda/13.2.0/network_installers/cuda_13.2.0_windows_network.exe"
          Invoke-WebRequest -Uri $url -OutFile cuda_installer.exe
          # Silent install — toolkit only (no driver, no samples)
          Start-Process -FilePath .\cuda_installer.exe -ArgumentList "-s cuda_toolkit_13.2" -Wait
          echo "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          echo "CUDA_HOME=C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v13.2" | Out-File -FilePath $env:GITHUB_ENV -Append

      # ── Python deps ──

      - name: Install PyTorch + build deps
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu132
          pip install setuptools wheel build

      # ── Build ──

      - name: Build wheel
        run: python -m build --wheel --no-isolation
        env:
          CUDA_HOME: ${{ env.CUDA_HOME }}
          TORCH_CUDA_ARCH_LIST: "12.0a"

      # ── Sign (Windows only) ──

      - name: Install Azure Trusted Signing CLI (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          dotnet tool install --global Azure.CodeSigning.Dlib

      - name: Sign wheel contents (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          # Unpack wheel, sign .pyd, repack
          $wheel = (Get-ChildItem dist/*.whl).FullName
          $tmpdir = "dist/unpack"
          python -m wheel unpack $wheel -d $tmpdir
          $pyds = Get-ChildItem -Recurse $tmpdir -Filter *.pyd
          foreach ($pyd in $pyds) {
            Write-Host "Signing $($pyd.FullName)"
            dlib sign -a redshed-ai -c DarrellThomas -cse EUS `
              -cfp "CN=Darrell Thomas" `
              -t "http://timestamp.acs.microsoft.com" `
              -i $pyd.FullName
          }
          # Repack
          Remove-Item $wheel
          $pkgdir = (Get-ChildItem $tmpdir -Directory).FullName
          python -m wheel pack $pkgdir -d dist

      # ── Upload ──

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os_short }}
          path: dist/*.whl

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --notes "## ComfyUI Blackwell Kernels ${{ github.ref_name }}

          RTX 5090 (sm_120a) CUDA kernels for ComfyUI.

          ### Install
          \`\`\`bash
          pip install comfyui_blackwell_kernels-*-$(python -c 'import platform; print(platform.system().lower())' )*.whl
          \`\`\`

          Or place in \`ComfyUI/custom_nodes/comfyui-blackwell-kernels/\`

          ### Requirements
          - NVIDIA RTX 5090
          - CUDA 13.2+
          - PyTorch 2.5+
          - Python 3.10+" \
            dist/*.whl dist/SHA256SUMS.txt
