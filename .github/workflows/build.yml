name: Build Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            os_short: linux
          - platform: windows-latest
            os_short: win
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── CUDA Toolkit ──

      - name: Install CUDA Toolkit (Linux)
        if: matrix.os_short == 'linux'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-13-2
          echo "/usr/local/cuda-13.2/bin" >> $GITHUB_PATH
          echo "CUDA_HOME=/usr/local/cuda-13.2" >> $GITHUB_ENV

      - name: Install CUDA Toolkit (Windows)
        if: matrix.os_short == 'win'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: 'local'
          use-github-cache: true

      - name: Set CUDA_HOME (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          echo "CUDA_HOME=$env:CUDA_PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          nvcc --version

      # ── Python deps ──

      - name: Install PyTorch + build deps (Linux)
        if: matrix.os_short == 'linux'
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu126
          pip install setuptools wheel

      - name: Install PyTorch + build deps (Windows)
        if: matrix.os_short == 'win'
        shell: bash
        run: |
          # Pin to 2.5.1 on Windows — PyTorch 2.6+ has std::byte ambiguity in MSVC headers
          pip install torch==2.5.1 --index-url https://download.pytorch.org/whl/cu126
          pip install setuptools wheel

      # ── Build ──

      - name: Build wheel (Linux)
        if: matrix.os_short == 'linux'
        run: |
          export CUDA_HOME=/usr/local/cuda-13.2
          export PATH=/usr/local/cuda-13.2/bin:$PATH
          export TORCH_CUDA_ARCH_LIST="12.0a"
          export TORCH_DONT_CHECK_COMPILER_ABI=1
          python setup.py bdist_wheel --dist-dir dist/
        env:
          PYTORCH_NVCC: /usr/local/cuda-13.2/bin/nvcc

      - name: Build wheel (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          $env:TORCH_CUDA_ARCH_LIST = "12.0a"
          $env:TORCH_DONT_CHECK_COMPILER_ABI = "1"
          nvcc --version
          python setup.py bdist_wheel --dist-dir dist/

      # ── Sign (Windows only) ──

      - name: Install Azure Trusted Signing CLI (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          dotnet tool install --global Azure.CodeSigning.Dlib

      - name: Sign wheel contents (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          $wheel = (Get-ChildItem dist/*.whl).FullName
          $tmpdir = "dist/unpack"
          pip install wheel
          python -m wheel unpack $wheel -d $tmpdir
          $pyds = Get-ChildItem -Recurse $tmpdir -Filter *.pyd
          foreach ($pyd in $pyds) {
            Write-Host "Signing $($pyd.FullName)"
            dlib sign -a redshed-ai -c DarrellThomas -cse EUS `
              -cfp "CN=Darrell Thomas" `
              -t "http://timestamp.acs.microsoft.com" `
              -i $pyd.FullName
          }
          Remove-Item $wheel
          $pkgdir = (Get-ChildItem $tmpdir -Directory).FullName
          python -m wheel pack $pkgdir -d dist

      # ── Upload ──

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os_short }}
          path: dist/*.whl

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --notes "## ComfyUI Blackwell Kernels ${{ github.ref_name }}

          RTX 5090 (sm_120a) CUDA kernels for ComfyUI.

          ### Install (pre-built)
          Download the .whl for your OS and run:
          \`\`\`
          pip install <downloaded>.whl
          \`\`\`

          ### Install (from source)
          \`\`\`
          git clone https://github.com/DarrellThomas/comfyui-blackwell-kernels
          cd comfyui-blackwell-kernels
          ./build.sh   # Linux
          build.bat     # Windows
          \`\`\`

          Then copy to \`ComfyUI/custom_nodes/comfyui-blackwell-kernels/\`

          ### Requirements
          - NVIDIA RTX 5090 (Compute Capability 12.0)
          - CUDA 13.2 Toolkit
          - PyTorch 2.5+
          - Python 3.10+" \
            dist/*.whl dist/SHA256SUMS.txt
