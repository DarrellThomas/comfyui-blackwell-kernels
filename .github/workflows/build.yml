name: Build Wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            os_short: linux
          - platform: windows-latest
            os_short: win
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ── CUDA Toolkit ──

      - name: Install CUDA Toolkit (Linux)
        if: matrix.os_short == 'linux'
        run: |
          wget -q https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-13-2
          echo "/usr/local/cuda-13.2/bin" >> $GITHUB_PATH
          echo "CUDA_HOME=/usr/local/cuda-13.2" >> $GITHUB_ENV

      - name: Install CUDA Toolkit (Windows)
        if: matrix.os_short == 'win'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '12.8.0'
          method: 'local'
          use-github-cache: true

      - name: Set CUDA_HOME (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          echo "CUDA_HOME=$env:CUDA_PATH" | Out-File -FilePath $env:GITHUB_ENV -Append
          nvcc --version

      # ── Python deps ──

      - name: Install PyTorch + build deps
        shell: bash
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cu126
          pip install setuptools wheel

      # ── Build ──

      - name: Build wheel (Linux)
        if: matrix.os_short == 'linux'
        run: |
          export CUDA_HOME=/usr/local/cuda-13.2
          export PATH=/usr/local/cuda-13.2/bin:$PATH
          export TORCH_CUDA_ARCH_LIST="12.0a"
          export TORCH_DONT_CHECK_COMPILER_ABI=1
          python setup.py bdist_wheel --dist-dir dist/
        env:
          PYTORCH_NVCC: /usr/local/cuda-13.2/bin/nvcc

      - name: Build wheel (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          $env:TORCH_CUDA_ARCH_LIST = "12.0a"
          $env:TORCH_DONT_CHECK_COMPILER_ABI = "1"
          nvcc --version
          python setup.py bdist_wheel --dist-dir dist/

      # ── Sign (Windows only) ──

      - name: Install Rust + trusted-signing-cli (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        run: |
          cargo install trusted-signing-cli

      - name: Sign wheel contents (Windows)
        if: matrix.os_short == 'win'
        shell: pwsh
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: |
          pip install wheel
          $whl = (Get-ChildItem dist/*.whl).FullName
          $tmpdir = "dist/unpack"
          python -m wheel unpack $whl -d $tmpdir
          $pyds = Get-ChildItem -Recurse $tmpdir -Filter *.pyd
          foreach ($pyd in $pyds) {
            Write-Host "Signing $($pyd.FullName)"
            trusted-signing-cli -e https://cus.codesigning.azure.net -a enparlant-public -c redshed-ai $pyd.FullName
          }
          Remove-Item $whl
          $pkgdir = (Get-ChildItem $tmpdir -Directory).FullName
          python -m wheel pack $pkgdir -d dist
          Write-Host "Signed wheel repacked"


      # ── Upload ──

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.os_short }}
          path: dist/*.whl

  release:
    needs: build
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Download all wheel artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.whl > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --title "${{ github.ref_name }}" \
            --notes "## ComfyUI Blackwell Kernels ${{ github.ref_name }}

          RTX 5090 (sm_120a) CUDA kernels for ComfyUI.

          ### Install (pre-built)
          Download the .whl for your OS and run:
          \`\`\`
          pip install <downloaded>.whl
          \`\`\`

          ### Install (from source)
          \`\`\`
          git clone https://github.com/DarrellThomas/comfyui-blackwell-kernels
          cd comfyui-blackwell-kernels
          ./build.sh   # Linux
          build.bat     # Windows
          \`\`\`

          Then copy to \`ComfyUI/custom_nodes/comfyui-blackwell-kernels/\`

          ### Requirements
          - NVIDIA RTX 5090 (Compute Capability 12.0)
          - CUDA 13.2 Toolkit
          - PyTorch 2.5+
          - Python 3.10+" \
            dist/*.whl dist/SHA256SUMS.txt

  virustotal:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download release artifacts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download ${{ github.ref_name }} \
            --repo ${{ github.repository }} \
            --pattern "*.whl" \
            --dir /tmp/vt
          echo "Files to scan:"
          ls -lh /tmp/vt/

      - name: Scan with VirusTotal
        env:
          VT_API_KEY: ${{ secrets.VIRUSTOTAL_API_KEY }}
        run: |
          OVERALL_MAX=0

          for FILE in /tmp/vt/*; do
            NAME=$(basename "$FILE")
            SHA256=$(sha256sum "$FILE" | cut -d' ' -f1)
            echo ""
            echo "── $NAME ──"
            echo "  SHA256: $SHA256"

            RESPONSE=$(curl -s --request POST \
              --url https://www.virustotal.com/api/v3/files \
              --header "x-apikey: $VT_API_KEY" \
              --form "file=@$FILE")
            if ! echo "$RESPONSE" | jq -e '.data.id' > /dev/null 2>&1; then
              echo "::warning::$NAME — VirusTotal upload failed: $RESPONSE"
              continue
            fi
            ANALYSIS_ID=$(echo "$RESPONSE" | jq -r '.data.id')
            echo "  Analysis ID: $ANALYSIS_ID"

            for i in $(seq 1 20); do
              sleep 30
              RESULT=$(curl -s --request GET \
                --url "https://www.virustotal.com/api/v3/analyses/$ANALYSIS_ID" \
                --header "x-apikey: $VT_API_KEY")
              STATUS=$(echo "$RESULT" | jq -r '.data.attributes.status')
              echo "  Attempt $i/20: $STATUS"

              if [ "$STATUS" = "completed" ]; then
                MALICIOUS=$(echo "$RESULT"  | jq -r '.data.attributes.stats.malicious')
                SUSPICIOUS=$(echo "$RESULT" | jq -r '.data.attributes.stats.suspicious')
                UNDETECTED=$(echo "$RESULT" | jq -r '.data.attributes.stats.undetected')
                echo "  Malicious:  $MALICIOUS"
                echo "  Suspicious: $SUSPICIOUS"
                echo "  Undetected: $UNDETECTED"
                echo "  Report:     https://www.virustotal.com/gui/file/$SHA256"

                if [ "$MALICIOUS" -ge 4 ]; then
                  echo "::error::$NAME — $MALICIOUS engines flagged this file!"
                elif [ "$MALICIOUS" -gt 0 ]; then
                  echo "::warning::$NAME — $MALICIOUS engine(s) flagged (likely false positive)"
                else
                  echo "::notice::$NAME — Clean"
                fi

                [ "$MALICIOUS" -gt "$OVERALL_MAX" ] && OVERALL_MAX="$MALICIOUS"
                break
              fi

              if [ "$i" -eq 20 ]; then
                echo "::warning::$NAME — VirusTotal analysis timed out"
              fi
            done
          done

          echo ""
          echo "=== Summary: max malicious detections across all artifacts: $OVERALL_MAX ==="
          [ "$OVERALL_MAX" -ge 4 ] && exit 1 || exit 0
